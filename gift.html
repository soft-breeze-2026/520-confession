<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神秘礼物</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"微软雅黑",sans-serif;
}

body{
    background:linear-gradient(to bottom,#fff8e1,#ffe082);
    overflow:hidden;
    height:100vh;
}

/* 第一页 */
#page1{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:30px;
}

.title{
    position:absolute;
    top:40px;
    font-size:36px;
    color:#ff9800;
    font-weight:bold;
}

.input-box{
    width:300px;
    height:50px;
    border-radius:30px;
    border:3px solid #ffb300;
    padding:0 20px;
    font-size:18px;
    outline:none;
}

.btn{
    width:160px;
    height:50px;
    border:none;
    border-radius:30px;
    background:#ff9800;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#ff6f00;
}

/* 第二页 */
#page2{
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    position:relative;
}

/* 礼盒 */
.gift-box{
    width:180px;
    height:180px;
    background:linear-gradient(135deg,#ff7043,#ffb74d);
    position:relative;
    border-radius:15px;
    animation:bounce 0.5s infinite alternate;
}

.gift-box::before{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:25px;
    background:#d84315;
    transform:translateY(-50%);
}

.gift-box::after{
    content:"";
    position:absolute;
    left:50%;
    top:0;
    width:25px;
    height:100%;
    background:#d84315;
    transform:translateX(-50%);
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-20px);
    }
}

/* 奶龙 */
#nailong{
    position:absolute;
    width:0;
    opacity:0;
    transition:all 2s ease;
}

.show{
    width:420px !important;
    opacity:1 !important;
}
</style>
</head>

<body>

<!-- 页面1 -->
<div id="page1">
    <div class="title">🎁 神秘礼物 🎁</div>

    <input 
        type="text"
        id="input"
        class="input-box"
        placeholder="请输入：神秘礼物"
    >

    <button class="btn" id="btn">
        提交
    </button>
</div>

<!-- 页面2 -->
<div id="page2">

    <div class="gift-box" id="giftBox"></div>

    <img
        id="nailong"
        src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/31d992019044411891131e9909459c5c~tplv-a9rns2rl98-image.image"
    >

</div>

<!-- 背景音乐 -->
<audio id="music" loop>
    <source 
        src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        type="audio/mpeg"
    >
</audio>

<script>

const btn = document.getElementById("btn");
const input = document.getElementById("input");

const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");

const giftBox = document.getElementById("giftBox");
const nailong = document.getElementById("nailong");

const music = document.getElementById("music");

btn.onclick = () => {

    if(input.value.trim() === "神秘礼物"){

        // 切换页面
        page1.style.display = "none";
        page2.style.display = "flex";

        // 播放音乐
        music.play();

        // 礼盒跳动后消失
        setTimeout(()=>{

            giftBox.style.display = "none";

            // 奶龙出现并放大
            nailong.classList.add("show");

        },2000);

    }else{
        alert("请输入正确关键词：神秘礼物");
    }

}

</script>

</body>
</html>
