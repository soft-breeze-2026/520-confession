<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神秘礼物</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"微软雅黑",sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#111;
}

/* 第一页 */
#page1{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%);
}

.title{
    font-size:38px;
    color:#fff;
    margin-bottom:30px;
    text-shadow:0 0 15px rgba(0,0,0,0.4);
}

.input-box{
    width:320px;
    height:55px;
    border-radius:30px;
    border:3px solid #ffb300;
    padding:0 20px;
    font-size:20px;
    outline:none;
    text-align:center;
}

.btn{
    width:180px;
    height:55px;
    border:none;
    border-radius:30px;
    background:#ff9800;
    color:#fff;
    font-size:22px;
    cursor:pointer;
    margin-top:25px;
    transition:0.3s;
}

.btn:hover{
    background:#f57c00;
    transform:scale(1.05);
}

/* 第二页 */
#page2{
    display:none;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:radial-gradient(circle,#333,#111);
    position:relative;
    overflow:hidden;
}

/* 礼盒 */
.gift-box{
    width:180px;
    height:180px;
    background:linear-gradient(135deg,#ff7043,#ffb74d);
    position:relative;
    border-radius:15px;
    animation:bounce 0.5s infinite alternate;
    box-shadow:0 0 25px rgba(255,150,0,0.8);
}

.gift-box::before{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:25px;
    background:#d84315;
    transform:translateY(-50%);
}

.gift-box::after{
    content:"";
    position:absolute;
    left:50%;
    top:0;
    width:25px;
    height:100%;
    background:#d84315;
    transform:translateX(-50%);
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-25px);
    }
}

/* 贝利亚 */
#belial{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:0;
    opacity:0;
    transition:all 0.35s ease-out;
    filter:drop-shadow(0 0 30px red);
}

#belial.show{
    width:450px !important;
    opacity:1 !important;
}

/* 文本 */
#text{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    color:#ff3333;
    font-size:34px;
    font-weight:bold;
    text-shadow:0 0 15px red;
    opacity:0;
    transition:opacity 0.5s;
}
</style>
</head>

<body>

<!-- 音乐 -->
<audio id="bgm" preload="auto" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
</audio>

<!-- 第一页 -->
<div id="page1">

    <div class="title">🎁 神秘礼物 🎁</div>

    <input 
        type="text"
        id="input"
        class="input-box"
        placeholder="请输入：神秘礼物"
    >

    <button class="btn" id="btn">
        提交
    </button>

</div>

<!-- 第二页 -->
<div id="page2">

    <div class="gift-box" id="giftBox"></div>

    <img 
        id="belial"
        src="https://i.imgur.com/8W3eQrL.png"
        alt="贝利亚"
    >

    <div id="text">
        你好呀，我是贝利亚，我来破坏地球了！
    </div>

</div>

<script>

const btn = document.getElementById("btn");
const input = document.getElementById("input");

const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");

const giftBox = document.getElementById("giftBox");
const belial = document.getElementById("belial");

const text = document.getElementById("text");
const bgm = document.getElementById("bgm");

// 点击提交
btn.onclick = () => {

    if(input.value.trim() === "神秘礼物"){

        // 切换页面
        page1.style.display = "none";
        page2.style.display = "flex";

        // 自动打开礼盒
        setTimeout(() => {

            // 礼盒消失
            giftBox.style.display = "none";

            // 贝利亚爆出
            belial.classList.add("show");

            // 文字出现
            text.style.opacity = "1";

            // 播放音乐
            bgm.play();

            // 语音
            const speech = new SpeechSynthesisUtterance(
                "你好呀，我是贝利亚，我来破坏地球了"
            );

            speech.lang = "zh-CN";
            speech.rate = 1;

            speechSynthesis.speak(speech);

        },2000);

    }else{

        alert("请输入正确关键词：神秘礼物");

    }

};

</script>

</body>
</html>
